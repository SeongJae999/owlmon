# OWLmon 로컬 개발 환경
# 사용법: docker compose up -d

services:
  # 메트릭 저장소 (TSDB)
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: owlmon-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-remote-write-receiver"  # Remote Write 수신 활성화
    restart: unless-stopped

  # 대시보드 (개발 중 시각화용)
  grafana:
    image: grafana/grafana:10.4.0
    container_name: owlmon-grafana
    ports:
      - "3000:3000"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=owlmon
      - GF_USERS_ALLOW_SIGN_UP=false
    restart: unless-stopped

  # OpenTelemetry Collector (에이전트 → Prometheus 중계)
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: owlmon-otel-collector
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8888:8888"   # Collector 자체 메트릭
    volumes:
      - ./infra/otel/otel-collector.yml:/etc/otelcol-contrib/config.yaml:ro
    restart: unless-stopped

  # PostgreSQL (알림 히스토리, 사용자 관리)
  postgres:
    image: postgres:16-alpine
    container_name: owlmon-postgres
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=owlmon
      - POSTGRES_USER=owlmon
      - POSTGRES_PASSWORD=owlmon
      - POSTGRES_HOST_AUTH_METHOD=trust
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:
  postgres-data:

# Prometheus 설정 (로컬 개발용)
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus 자체 메트릭
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # OTel Collector 메트릭
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8888"]

  # OWLmon API 서버 (Step 3에서 활성화)
  # - job_name: "owlmon-api"
  #   static_configs:
  #     - targets: ["host.docker.internal:8000"]
